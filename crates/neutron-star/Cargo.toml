[package]
name = "neutron-star"
description = "Trait-first, statically-dispatched box-layout protocol and engine (CSS flexbox + grid) for host-owned trees"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
keywords = ["layout", "flexbox", "grid", "css", "ui"]
categories = ["gui"]

# Deliberately zero dependencies and zero feature flags: the whole engine
# boundary is traits + plain-old-data, so the crate stays
# standalone-publishable and hosts pay for nothing they don't call. (An
# optional `serde` feature for golden-fixture tests is planned for L1, when
# those tests exist.)
[dependencies]

[lints]
workspace = true
