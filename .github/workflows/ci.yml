name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: fmt + clippy + test + coverage + bench (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # vendor/stylo (the Lynx-patched stylo fork) is a submodule.
          submodules: recursive

      # Installs the nightly toolchain + components pinned in rust-toolchain.toml.
      - name: Install pinned toolchain
        run: rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - name: Format
        # Select workspace crates explicitly: cargo-fmt's metadata traversal
        # also descends into the separately-versioned vendor/stylo workspace.
        run: >-
          cargo fmt --check
          -p bobcat-engine
          -p bobcat-quickjs
          -p lynx-template-decoder
          -p lynx-widget
          -p quickjs-rust-bridge
          -p w3c-dom
          -p neutron-star

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install cargo-llvm-cov and cargo-codspeed 5
        uses: taiki-e/install-action@v2
        with:
          # Keep cargo-codspeed's major aligned with codspeed-divan-compat.
          tool: cargo-llvm-cov,cargo-codspeed@5

      # Runs the test suite under coverage instrumentation (replaces a plain
      # `cargo test` run for lib/integration tests). The vendored stylo fork
      # is a local path dependency, so llvm-cov would otherwise count its
      # sources in the report.
      - name: Tests + coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(^|/)vendor(/|$)'

      # Keep neutron-star's production source above the agreed line-coverage
      # floor. Integration tests are executed, but test/benchmark source is
      # excluded from the metric. Clear the preceding workspace run's profiles
      # first so dependency and vendor coverage cannot leak into this package-
      # scoped report.
      - name: Neutron-star 95% coverage gate
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p neutron-star --locked --summary-only \
            --ignore-filename-regex '(^|/)(tests|benches|vendor)(/|$)' \
            --fail-under-lines 95

      # The Lynx patch series in the vendored stylo fork carries its own test
      # suites; vendor/stylo is excluded from the workspace, so run them here
      # or rebases regress silently. The target list is discovered from the
      # fork checkout (a hardcoded list rots silently when the rebased branch
      # adds suites). All of them live behind the fork's `lynx` feature except
      # `lynx_feature_off_parity`, which guards the feature-OFF build and
      # belongs to the fork repo's own CI — running it here would cost a full
      # second stylo compile for a fork-side concern.
      - name: Stylo fork Lynx tests
        run: |
          targets=""
          for file in vendor/stylo/style/tests/lynx_*.rs; do
            name="$(basename "$file" .rs)"
            [ "$name" = "lynx_feature_off_parity" ] && continue
            targets="$targets --test $name"
          done
          echo "discovered:$targets"
          cargo test --manifest-path vendor/stylo/Cargo.toml -p stylo --features lynx $targets

      - name: Doctests
        run: cargo test --doc

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

      # CodSpeed on macOS aarch64: the valgrind-based simulation instrument is
      # Linux-only (the runner bails with "Unsupported system" on anything but
      # Ubuntu/Debian), but walltime mode is FullySupported on macOS since
      # runner v4.15 (darwin-aarch64 binaries, samply profiler). Expect more
      # run-to-run noise than CodSpeed's dedicated macro runners.
      - name: Build benchmarks
        run: cargo codspeed build -m walltime

      - name: Run benchmarks (CodSpeed, walltime)
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: cargo codspeed run -m walltime
          # Tokenless upload works for public repos; set CODSPEED_TOKEN in the
          # repo secrets once the project is registered on codspeed.io to make
          # uploads authenticated.
          token: ${{ secrets.CODSPEED_TOKEN }}

  memory-benchmarks:
    name: bench (CodSpeed memory, Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # vendor/stylo (the Lynx-patched stylo fork) is a submodule.
          submodules: recursive

      # Installs the nightly toolchain + components pinned in rust-toolchain.toml.
      - name: Install pinned toolchain
        run: rustup toolchain install

      - name: Install benchmark system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libfontconfig1-dev

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-codspeed 5
        uses: taiki-e/install-action@v2
        with:
          # Keep cargo-codspeed's major aligned with codspeed-divan-compat.
          tool: cargo-codspeed@5

      # The memory instrument uses Linux eBPF to track heap allocations, so it
      # runs separately from the macOS walltime benchmarks above.
      - name: Build benchmarks (CodSpeed, memory)
        run: cargo codspeed build -m memory

      - name: Run benchmarks (CodSpeed, memory)
        uses: CodSpeedHQ/action@v4
        with:
          mode: memory
          run: cargo codspeed run -m memory
          # Tokenless upload works for public repos; set CODSPEED_TOKEN in the
          # repo secrets once the project is registered on codspeed.io to make
          # uploads authenticated.
          token: ${{ secrets.CODSPEED_TOKEN }}
