name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: fmt + clippy + test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the nightly toolchain + components pinned in rust-toolchain.toml.
      - name: Install pinned toolchain
        run: rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
