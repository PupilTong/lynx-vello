name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: build · test · lint (aarch64 macOS)
    # macos-15 is an Apple Silicon (aarch64) GitHub-hosted runner.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Verify aarch64 host
        run: |
          uname -m
          test "$(uname -m)" = "arm64"

      # rust-toolchain.toml pins the nightly channel + components, so the
      # toolchain action installs exactly what the repo declares.
      - name: Install pinned toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-04-20
          components: rustfmt, clippy, rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-features
